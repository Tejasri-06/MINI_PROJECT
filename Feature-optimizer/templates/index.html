<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automated Feature Optimization</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Genetic Algorithm Feature Optimizer</h1>

    <form id="uploadForm">
        <div class="form-group">
            <label>Select CSV File</label>
            <input type="file" name="file" required>
        </div>

        <div class="form-group">
            <label>Target Column Name</label>
            <input type="text" name="target" placeholder="e.g. Outcome" required>
        </div>

        <button type="submit">Optimize Features</button>
    </form>

    <div id="loading" class="hidden">Processing... Please wait ⏳</div>
    <div id="result" class="result-box"></div>
</div>
<script src="{{ url_for('static', filename='script.js')}}"></script>
<script src="{{ url_for('static', filename='style.css')}}"></script>
</body>
</html>
